<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Chess Masters</title>
    <meta name="description"
        content="Sign in to your Chess Masters Club account. Access tournaments, Grandmaster coaching sessions, and elite member privileges.">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="apple-touch-icon" href="assets/images/favicon.png">
    <!-- Open Graph / SEO -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sign In - Chess Masters">
    <meta property="og:description" content="Sign in to your Chess Masters Club account.">
    <meta property="og:url" content="https://chessmasters.com/login.html">
    <meta property="og:image" content="assets/images/hero-1.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="robots" content="index, follow">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 1.5rem 3rem;
            background-color: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at top left, rgba(201, 162, 39, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-premium);
            position: relative;
            z-index: 1;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px 8px 0 0;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .auth-logo svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-primary);
        }

        .auth-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-title h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .auth-title p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .auth-form .form-group {
            margin-bottom: 1.25rem;
        }

        .auth-form label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .auth-form input,
        .auth-form select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .auth-form input:focus,
        .auth-form select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.1);
        }

        .auth-form input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .auth-submit {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.85rem;
            font-size: 1rem;
        }

        .auth-divider {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin: 1.5rem 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background-color: var(--border-color);
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-primary);
            font-weight: 500;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .social-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--text-primary);
            transition: all var(--transition-fast);
            background-color: var(--bg-secondary);
            font-size: 1.1rem;
            text-decoration: none;
        }

        .social-login-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            box-shadow: 0 0 10px var(--glow);
            transform: translateY(-2px);
        }

        .auth-controls {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }

        html[dir="rtl"] .auth-controls {
            right: auto;
            left: 1.5rem;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }

            .auth-page {
                padding: 5rem 1rem 2rem;
            }
        }
    </style>
</head>

<body>

    <main class="auth-page">
        <!-- Theme & RTL controls - fixed top-right outside card -->
        <div class="auth-controls">
            <button class="control-btn theme-toggle-btn" title="Toggle Theme"><i class="fas fa-sun"></i></button>
            <button class="control-btn rtl-toggle-btn" title="Switch to RTL"><i class="fas fa-right-left"></i></button>
        </div>

        <div class="auth-card">

            <!-- Logo -->
            <a href="index.html" class="auth-logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50,15 L53,23 L61,23 L55,28 L57,36 L50,31 L43,36 L45,28 L39,23 L47,23 Z" />
                    <path d="M35,40 L65,40 L62,48 L38,48 Z" />
                    <rect x="42" y="48" width="16" height="24" rx="2" />
                    <path d="M30,76 L70,76 L66,84 L34,84 Z" />
                    <rect x="25" y="84" width="50" height="4" />
                </svg>
                <div class="logo-text">CHESS<span class="logo-accent">MASTERS</span></div>
            </a>

            <!-- Title -->
            <div class="auth-title">
                <h1>Welcome Back</h1>
                <p>Sign in to access your Chess Masters dashboard.</p>
            </div>

            <!-- Sign In Form -->
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" placeholder="chess@example.com" required>
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="password">Password *</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" id="password" placeholder="••••••••" required
                            style="padding-right: 2.5rem;">
                        <i class="far fa-eye" id="toggle-password"
                            style="position: absolute; right: 1rem; cursor: pointer; color: var(--text-secondary); opacity: 0.7; transition: opacity var(--transition-fast);"></i>
                    </div>
                </div>

                <div class="form-group"
                    style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem;">
                    <label for="remember-me"
                        style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer; font-size: 0.9rem;">
                        <input type="checkbox" id="remember-me" style="width: auto; margin: 0; cursor: pointer;">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password-link"
                        style="color: var(--accent-primary); font-size: 0.9rem; text-decoration: none; font-weight: 500; transition: color var(--transition-fast);">Forgot
                        Password?</a>
                </div>

                <button type="submit" class="btn btn-primary auth-submit" id="login-btn">
                    Sign In
                </button>
            </form>

            <div class="auth-divider">or continue with</div>

            <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; margin-bottom: 2rem;">
                <a href="#" class="social-login-btn" title="Continue with Google"><i class="fab fa-google"></i></a>
                <a href="#" class="social-login-btn" title="Continue with Facebook"><i
                        class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-login-btn" title="Continue with Apple"><i class="fab fa-apple"></i></a>
            </div>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </p>

        </div>
    </main>

    <!-- Scroll to Top Button -->
    <button id="scroll-to-top-btn" class="scroll-top-btn" title="Scroll to Top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- JS Scripts -->
    <script src="assets/js/main.js"></script>
    <script>
        // Password Visibility Toggle
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.classList.toggle('fa-eye');
                togglePassword.classList.toggle('fa-eye-slash');
            });
        }

        // Login form submission
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        if (loginForm && loginBtn) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const original = loginBtn.innerHTML;
                loginBtn.disabled = true;
                loginBtn.innerHTML = 'Signing In...';
                setTimeout(() => {
                    alert('Sign in successful! Redirecting to dashboard...');
                    loginForm.reset();
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = original;
                }, 1200);
            });
        }

        // Add forgot password link hover underline
        const forgotLink = document.querySelector('.forgot-password-link');
        if (forgotLink) {
            forgotLink.addEventListener('mouseenter', () => forgotLink.style.textDecoration = 'underline');
            forgotLink.addEventListener('mouseleave', () => forgotLink.style.textDecoration = 'none');
        }
    </script>
</body>

</html>
